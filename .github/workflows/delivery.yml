name: Delivery

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: read
    packages: write
    security-events: write

jobs:
    publish-docker-image:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # Published releases use the full 'release' profile (lto = true) and are
            # tagged with the version number. All other events use the faster 'edge'
            # profile (lto = "thin") and are tagged as edge / pr-N / branch name.
            - name: Select build profile
              id: config
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                      echo "profile=release" >> "$GITHUB_OUTPUT"
                  else
                      echo "profile=edge" >> "$GITHUB_OUTPUT"
                  fi

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=semver,pattern={{version}},event=tag
                      type=semver,pattern={{major}}.{{minor}},event=tag
                      type=edge,enable=${{ github.event_name != 'release' }}
                      type=ref,event=pr
                      type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Build amd64-only first so we can load it locally for the security scan.
            # GHA cache is populated here; the multi-platform push below reuses it.
            - name: Build and load for scanning (amd64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  load: true
                  platforms: linux/amd64
                  tags: local/postguard:scan
                  build-args: CARGO_PROFILE=${{ steps.config.outputs.profile }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Scan image
              uses: anchore/scan-action@v3
              id: scan
              with:
                  image: local/postguard:scan
                  only-fixed: true
                  fail-build: true
                  severity-cutoff: critical
                  output-format: sarif

            - name: Upload Anchore scan SARIF report
              uses: github/codeql-action/upload-sarif@v3
              if: ${{ !cancelled() }}
              with:
                  sarif_file: ${{ steps.scan.outputs.sarif }}

            # Push multi-platform image. amd64 layers are fully cached from the scan
            # build above; arm64 layers are cached from previous runs via type=gha.
            - name: Push multi-platform image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: CARGO_PROFILE=${{ steps.config.outputs.profile }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
