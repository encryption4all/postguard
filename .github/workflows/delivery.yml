name: Delivery

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [published]
    workflow_dispatch:

env:
    # True when this run was triggered by a pg-pkg release (Docker image release)
    IS_PKG_RELEASE: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'pg-pkg-v') }}

permissions:
    contents: read
    packages: write
    security-events: write

jobs:
    build-amd64:
        if: ${{ !(github.event_name == 'release' && startsWith(github.event.release.tag_name, 'pg-wasm-v')) }}
        runs-on: ubuntu-latest
        outputs:
            digest: ${{ steps.build.outputs.digest }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select build profile
              id: config
              run: |
                  if [ "${{ env.IS_PKG_RELEASE }}" = "true" ]; then
                      echo "profile=release" >> "$GITHUB_OUTPUT"
                  else
                      echo "profile=edge" >> "$GITHUB_OUTPUT"
                  fi

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push (linux/amd64)
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64
                  push: true
                  provenance: false
                  tags: ghcr.io/${{ github.repository }}:build-${{ github.run_id }}-amd64
                  build-args: CARGO_PROFILE=${{ steps.config.outputs.profile }}
                  cache-from: type=gha,scope=build-amd64
                  cache-to: type=gha,mode=max,scope=build-amd64

    build-arm64:
        if: ${{ !(github.event_name == 'release' && startsWith(github.event.release.tag_name, 'pg-wasm-v')) }}
        runs-on: ubuntu-24.04-arm
        outputs:
            digest: ${{ steps.build.outputs.digest }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select build profile
              id: config
              run: |
                  if [ "${{ env.IS_PKG_RELEASE }}" = "true" ]; then
                      echo "profile=release" >> "$GITHUB_OUTPUT"
                  else
                      echo "profile=edge" >> "$GITHUB_OUTPUT"
                  fi

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push (linux/arm64)
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/arm64
                  push: true
                  provenance: false
                  tags: ghcr.io/${{ github.repository }}:build-${{ github.run_id }}-arm64
                  build-args: CARGO_PROFILE=${{ steps.config.outputs.profile }}
                  cache-from: type=gha,scope=build-arm64
                  cache-to: type=gha,mode=max,scope=build-arm64

    publish-docker-image:
        runs-on: ubuntu-latest
        needs: [build-amd64]
        steps:
            - name: Scan image
              uses: anchore/scan-action@v6
              id: scan
              with:
                  image: ghcr.io/${{ github.repository }}:build-${{ github.run_id }}-amd64
                  only-fixed: true
                  fail-build: true
                  severity-cutoff: critical
                  output-format: sarif

            - name: Upload Anchore scan SARIF report
              uses: github/codeql-action/upload-sarif@v4
              if: ${{ !cancelled() }}
              with:
                  sarif_file: ${{ steps.scan.outputs.sarif }}

    merge:
        runs-on: ubuntu-latest
        needs: [build-amd64, build-arm64, publish-docker-image]
        steps:
            # No checkout needed: docker/metadata-action reads from the GitHub Actions context.
            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=match,pattern=pg-pkg-v(.*),group=1,event=tag
                      type=match,pattern=pg-pkg-v(\d+\.\d+),group=1,event=tag
                      type=edge,enable=${{ !fromJSON(env.IS_PKG_RELEASE) }}
                      type=ref,event=pr
                      type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Combine the two platform-specific images into a single multi-arch manifest.
            # DOCKER_METADATA_OUTPUT_JSON is set automatically by docker/metadata-action.
            - name: Create and push multi-arch manifest
              run: |
                  docker buildx imagetools create \
                      $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                      "ghcr.io/${{ github.repository }}@${{ needs.build-amd64.outputs.digest }}" \
                      "ghcr.io/${{ github.repository }}@${{ needs.build-arm64.outputs.digest }}"

    publish-pg-wasm:
        name: Publish pg-wasm to npm
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'pg-wasm-v') }}
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Extract version from tag
              id: version
              run: echo "version=${GITHUB_REF_NAME#pg-wasm-v}" >> "$GITHUB_OUTPUT"

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Install wasm-pack
              run: cargo install wasm-pack

            - name: Build pg-wasm (bundler)
              run: wasm-pack build --release -d pkg/bundler --out-name index --scope e4a --target bundler ./pg-wasm

            - name: Build pg-wasm (web)
              run: wasm-pack build --release -d pkg/web --out-name index --scope e4a --target web ./pg-wasm

            - name: Assemble package
              working-directory: pg-wasm/pkg
              run: |
                  # Clean up wasm-pack generated files from subdirectories
                  rm -f bundler/package.json bundler/.gitignore bundler/README.md
                  rm -f web/package.json web/.gitignore web/README.md

                  # Write the combined package.json using node to ensure valid JSON
                  node -e "
                  const pkg = {
                    name: '@e4a/pg-wasm',
                    type: 'module',
                    collaborators: [
                      'Leon Botros <l.botros@cs.ru.nl>',
                      'Bas Westerbaan <bas@westerbaan.name>'
                    ],
                    description: 'PostGuard WebAssembly bindings for the browser',
                    version: '0.0.0',
                    license: 'MIT',
                    repository: {
                      type: 'git',
                      url: 'https://github.com/encryption4all/postguard/tree/main/pg-wasm'
                    },
                    exports: {
                      '.': { types: './bundler/index.d.ts', import: './bundler/index.js' },
                      './web': { types: './web/index.d.ts', import: './web/index.js' }
                    },
                    main: './bundler/index.js',
                    types: './bundler/index.d.ts',
                    sideEffects: ['./bundler/index.js', './snippets/*'],
                    keywords: ['ibe', 'encryption', 'ecc']
                  };
                  require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
                  "

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Set version from tag
              run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
              working-directory: pg-wasm/pkg

            - name: Publish to npm
              run: npm publish
              working-directory: pg-wasm/pkg
