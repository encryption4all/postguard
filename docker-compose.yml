services:
    pg-pkg:
        build:
            context: .
            dockerfile: dev.Dockerfile
        container_name: pg-pkg
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
            interval: 1m30s
            timeout: 5s
            retries: 3
            start_interval: 1s
            start_period: 30s
        ports:
            - "8087:8087"
        volumes:
            - .:/app
            - pg-pkg-target:/app/target
        environment:
            - RUST_LOG=debug
            - RUST_BACKTRACE=1
            - IRMA_SERVER=http://irma-server:8088
            - DATABASE_URL=postgres://devuser:devpassword@postgres:5432/devdb
        networks:
            - pg-network
        depends_on:
            irma-healthcheck:
                condition: service_healthy
            postgres:
                condition: service_healthy

    # Generates the IRMA JWT signing key if it doesn't exist yet.
    irma-keygen:
        image: alpine:latest
        container_name: pg-irma-keygen
        entrypoint: ["/bin/sh", "-c", "if [ ! -f /keys/jwt_privkey.pem ]; then apk add --no-cache openssl && openssl genrsa -out /keys/jwt_privkey.pem 2048 && chmod 644 /keys/jwt_privkey.pem; fi"]
        volumes:
            - irma-keys:/keys

    # IRMA/Yivi server (unauthenticated, for development only)
    irma-server:
        image: ghcr.io/privacybydesign/irma:latest
        container_name: pg-irma-server
        command: server --no-auth -v --url http://localhost:8088 --jwt-privkey-file /keys/jwt_privkey.pem
        ports:
            - "8088:8088"
        volumes:
            - irma-keys:/keys:ro
        depends_on:
            irma-keygen:
                condition: service_completed_successfully
        networks:
            - pg-network

    irma-healthcheck:
        image: alpine:latest
        container_name: pg-irma-healthcheck
        entrypoint: ["sleep", "infinity"]
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://irma-server:8088/health"]
            interval: 1m30s
            timeout: 5s
            retries: 3
            start_interval: 1s
            start_period: 10s
        depends_on:
            - irma-server
        networks:
            - pg-network

    postgres:
        image: postgres:18
        container_name: pg-postgres
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
            interval: 1m30s
            timeout: 5s
            retries: 3
            start_interval: 1s
            start_period: 10s
        environment:
            POSTGRES_USER: devuser
            POSTGRES_PASSWORD: devpassword
            POSTGRES_DB: devdb
        volumes:
            - pg-postgres-data:/var/lib/postgresql
        ports:
            - "5432:5432"
        networks:
            - pg-network

    adminer:
        image: adminer
        container_name: pg-adminer
        restart: always
        environment:
            ADMINER_DEFAULT_SERVER: postgres
        depends_on:
            - postgres
        ports:
            - "8080:8080"
        networks:
            - pg-network

networks:
    pg-network:
        driver: bridge

volumes:
    pg-pkg-target:
    pg-postgres-data:
    irma-keys:
